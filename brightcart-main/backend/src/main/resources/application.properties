spring.application.name=ecommerce-backend
spring.profiles.default=oracle

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

app.cors.frontend-url=${APP_CORS_FRONTEND_URL:http://localhost:5173,http://127.0.0.1:5173}
app.auth.cleanup-interval-ms=900000
app.schema.fail-on-mismatch=false
